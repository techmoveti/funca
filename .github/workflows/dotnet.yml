name: .NET

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]  # Publicar quando criar uma tag
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore src/Funca.slnx
    - name: Build
      run: dotnet build src/Funca.slnx --no-restore -c Release
    - name: Test
      run: dotnet test src/Funca.slnx --no-build --verbosity normal -c Release
    
    - name: Pack NuGet
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet pack src/Funca.slnx -c Release --no-build --output ./nupkg
    
    - name: Push to NuGet
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet nuget push "./nupkg/*.nupkg" 
        --api-key ${{ secrets.NUGET_API_KEY }} 
        --source https://api.nuget.org/v3/index.json
        --skip-duplicate
        --no-symbols
